name: Build and deploy catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "13 2 */3 * *"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  PARSER_RUNTIME_ENABLED: "1"
  PARSER_RUNTIME_GRADLE: "gradle"
  PARSER_RUNTIME_DIR: "tools/parser-checker"

  PARSER_CHECKER_WORKERS: "12"
  PARSER_CHECKER_TIMEOUT_MS: "12000"
  PARSER_CHECKER_RATE_DELAY_MS: "25"
  PARSER_CHECKER_RETRIES: "0"
  PARSER_CHECKER_BACKOFF_MS: "100"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out website repository
        uses: actions/checkout@v4

      - name: Check out parser source repository
        uses: actions/checkout@v4
        with:
          repository: YakaTeam/kotatsu-parsers
          ref: master
          path: .cache/kotatsu-parsers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Verify Python dependencies
        run: python3 -c "import sys, aiosqlite; print(sys.executable); print('aiosqlite ok:', aiosqlite.__version__)"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Node dependencies
        run: npm install --no-fund --no-audit

      - name: Build Parser runtime checker
        working-directory: tools/parser-checker
        run: gradle build --console=plain

      - name: Generate parser catalog JSON
        run: >
          python3 scripts/build_catalog.py
          --repo-dir .cache/kotatsu-parsers
          --output public/data/sources.json
          --owner YakaTeam
          --repo kotatsu-parsers
          --branch master

      - name: Generate parser catalog SQLite
        run: |
          python3 -m pip install aiosqlite==0.21.0
          python3 -c "import sys, aiosqlite; print(sys.executable); print('aiosqlite ok:', aiosqlite.__version__)"
          python3 scripts/build_catalog_db.py \
            --input public/data/sources.json \
            --output public/data/sources.sqlite

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: dist
          force_orphan: true
          cname: parser.inval.dev
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
