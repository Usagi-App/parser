name: Build and deploy catalog

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '13 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website repository
        uses: actions/checkout@v4

      - name: Check out parser source repository
        uses: actions/checkout@v4
        with:
          repository: YakaTeam/kotatsu-parsers
          ref: master
          path: .cache/kotatsu-parsers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Generate parser catalog dataset
        run: >
          python3 scripts/build_catalog.py
          --repo-dir .cache/kotatsu-parsers
          --output public/data/sources.json
          --owner YakaTeam
          --repo kotatsu-parsers
          --branch master

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
